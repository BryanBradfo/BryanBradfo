name: Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - master
      - main
  workflow_dispatch: # Permet de le lancer manuellement

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: 🦑 Personal metrics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: header
          plugin_isocalendar: yes
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex, less, dockerfile, makefile, qmake, lex, cmake, gnuplot, vue, scala, ejs
          plugin_languages_details: lines, percentage
          plugin_languages_sections: most-used, recently-used
          plugin_languages_indepth: yes
          plugin_languages_limit: 4
          plugin_discussions: yes
          config_order: base.header, isocalendar, languages, discussions
          output_action: commit
